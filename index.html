<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OBQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:     #0c0e14;
      --bg2:    #13161f;
      --bg3:    #1a1e2a;
      --border: rgba(255,255,255,0.07);
      --text:   #e8eaf0;
      --muted:  #7a8299;
      --accent: #4f8ef7;
      --green:  #3ecf8e;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .logo {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 40px;
      text-align: center;
    }
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      width: 100%;
      max-width: 620px;
    }
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px;
      text-decoration: none;
      color: inherit;
      display: block;
      position: relative;
      overflow: hidden;
      transition: border-color 0.15s, transform 0.15s;
    }
    .card:hover { border-color: rgba(255,255,255,0.18); transform: translateY(-2px); }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: 14px 14px 0 0;
    }
    .card.blue::before  { background: var(--accent); }
    .card.green::before { background: var(--green); }
    .card-icon { font-size: 32px; margin-bottom: 16px; display: block; }
    .card h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; }
    .card p { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 20px; }
    .card-cta {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.5px;
      color: var(--accent);
    }
    .card.green .card-cta { color: var(--green); }
    .card-cta::after { content: ' →'; }
    footer {
      margin-top: 48px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="logo">OBQ</div>

  <div class="card-grid">
    <a href="./app/" class="card blue">
      <span class="card-icon">📚</span>
      <h2>Kurshub</h2>
      <p>Kursgjennomganger, quiz og egne quiz-sett. AWS CLF-C02, ISTQB CTFL og flere.</p>
      <span class="card-cta">Åpne kurshub</span>
    </a>
    <a href="./kokebok/" class="card green">
      <span class="card-icon">📗</span>
      <h2>Kokebok</h2>
      <p>Strukturerte notater fra kurs og sertifiseringer i søkbart mdBook-format.</p>
      <span class="card-cta">Åpne kokebok</span>
    </a>
  </div>

  <footer>OBQ</footer>
</body>
</html>
